<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PC Remote Control</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    header {
      text-align: center;
      padding: 30px 0;
    }
    h1 { font-size: 2.5em; margin-bottom: 10px; }
    .status {
      display: inline-block;
      padding: 8px 20px;
      border-radius: 20px;
      font-weight: bold;
      margin-top: 10px;
    }
    .status.online { background: #4caf50; }
    .status.offline { background: #f44336; }
    .card {
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      padding: 25px;
      margin: 20px 0;
      backdrop-filter: blur(10px);
    }
    .card h2 { margin-bottom: 15px; font-size: 1.5em; }
    .form-group { margin: 15px 0; }
    label { display: block; margin-bottom: 5px; color: #aaa; }
    input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    input:focus { outline: 2px solid #4caf50; }
    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover { transform: translateY(-2px); }
    .btn-primary { background: #4caf50; color: white; }
    .btn-secondary { background: #2196f3; color: white; }
    .btn-danger { background: #f44336; color: white; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 15px;
    }
    .stat-item {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }
    .stat-value { font-size: 2em; font-weight: bold; color: #4caf50; }
    .stat-label { color: #aaa; font-size: 0.9em; margin-top: 5px; }
    .logs {
      background: #000;
      padding: 15px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
    }
    .log-entry { margin: 5px 0; }
    .log-info { color: #4caf50; }
    .log-error { color: #f44336; }
    .log-warn { color: #ff9800; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🖥️ PC Remote Control</h1>
      <div id="connectionStatus" class="status offline">🔴 Offline</div>
    </header>

    <!-- Settings Card -->
    <div class="card" id="settingsCard">
      <h2>⚙️ Настройки</h2>
      <div class="form-group">
        <label>Cloudflare Worker URL</label>
        <input type="text" id="workerUrl" placeholder="https://your-worker.workers.dev">
      </div>
      <div class="form-group">
        <label>Device ID</label>
        <input type="text" id="deviceId" placeholder="ABCD-1234">
      </div>
      <button class="btn-primary" onclick="saveSettings()">💾 Сохранить</button>
      <button class="btn-secondary" onclick="generateDeviceId()" style="margin-top: 10px;">🎲 Генерировать ID</button>
    </div>

    <!-- Stats Card -->
    <div class="card hidden" id="statsCard">
      <h2>📊 Статус системы</h2>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value" id="cpuUsage">-</div>
          <div class="stat-label">CPU %</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="ramUsage">-</div>
          <div class="stat-label">RAM GB</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="battery">-</div>
          <div class="stat-label">Батарея %</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="uptime">-</div>
          <div class="stat-label">Uptime</div>
        </div>
      </div>
      <button class="btn-secondary" onclick="refreshStats()" style="margin-top: 20px;">🔄 Обновить</button>
    </div>

    <!-- Logs Card -->
    <div class="card">
      <h2>📋 Логи</h2>
      <div class="logs" id="logs"></div>
      <button class="btn-danger" onclick="clearLogs()" style="margin-top: 10px;">🗑️ Очистить</button>
    </div>
  </div>

  <script>
    let config = { workerUrl: '', deviceId: '' };
    let pollInterval = null;

    // Load config
    function loadConfig() {
      const saved = localStorage.getItem('pcRemoteConfig');
      if (saved) {
        config = JSON.parse(saved);
        document.getElementById('workerUrl').value = config.workerUrl || '';
        document.getElementById('deviceId').value = config.deviceId || '';
        log('Конфигурация загружена', 'info');
      }
    }

    // Save config
    function saveSettings() {
      config.workerUrl = document.getElementById('workerUrl').value.trim();
      config.deviceId = document.getElementById('deviceId').value.trim().toUpperCase();
      
      if (!config.workerUrl || !config.deviceId) {
        log('❌ Заполните все поля', 'error');
        return;
      }
      
      localStorage.setItem('pcRemoteConfig', JSON.stringify(config));
      log('✅ Настройки сохранены', 'info');
      startPolling();
    }

    // Generate Device ID
    function generateDeviceId() {
      const id = Math.random().toString(36).substring(2, 6).toUpperCase();
      const id2 = Math.random().toString(36).substring(2, 6).toUpperCase();
      document.getElementById('deviceId').value = `${id}-${id2}`;
      log(`🎲 Сгенерирован ID: ${id}-${id2}`, 'info');
    }

    // Log function
    function log(message, type = 'info') {
      const logs = document.getElementById('logs');
      const time = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = `log-entry log-${type}`;
      entry.textContent = `[${time}] ${message}`;
      logs.appendChild(entry);
      logs.scrollTop = logs.scrollHeight;
    }

    // Clear logs
    function clearLogs() {
      document.getElementById('logs').innerHTML = '';
      log('Логи очищены', 'info');
    }

    // Update status
    function updateStatus(online) {
      const status = document.getElementById('connectionStatus');
      status.className = `status ${online ? 'online' : 'offline'}`;
      status.textContent = online ? '🟢 Online' : '🔴 Offline';
    }

    // Send heartbeat
    async function sendHeartbeat() {
      if (!config.workerUrl || !config.deviceId) return;
      
      try {
        const res = await fetch(`${config.workerUrl}/api/device/${config.deviceId}/heartbeat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        const data = await res.json();
        
        if (data.ok) {
          updateStatus(true);
          log('❤️ Heartbeat отправлен', 'info');
        } else {
          updateStatus(false);
          log('❌ Heartbeat failed: ' + data.error, 'error');
        }
      } catch (e) {
        updateStatus(false);
        log('❌ Ошибка сети: ' + e.message, 'error');
      }
    }

    // Get stats
    async function refreshStats() {
      if (!config.workerUrl || !config.deviceId) return;
      
      try {
        const res = await fetch(`${config.workerUrl}/api/device/${config.deviceId}/status`);
        const data = await res.json();
        
        if (data.ok && data.device) {
          const d = data.device;
          document.getElementById('cpuUsage').textContent = d.cpuUsage || '-';
          document.getElementById('ramUsage').textContent = d.ramUsed || '-';
          document.getElementById('battery').textContent = d.batteryLevel || '-';
          document.getElementById('uptime').textContent = formatUptime(d.uptime);
          document.getElementById('statsCard').classList.remove('hidden');
          log('📊 Статус обновлен', 'info');
        }
      } catch (e) {
        log('❌ Ошибка получения статуса: ' + e.message, 'error');
      }
    }

    // Format uptime
    function formatUptime(seconds) {
      if (!seconds) return '-';
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      return `${h}ч ${m}м`;
    }

    // Start polling
    function startPolling() {
      if (pollInterval) clearInterval(pollInterval);
      sendHeartbeat();
      refreshStats();
      pollInterval = setInterval(() => {
        sendHeartbeat();
      }, 30000); // Every 30 seconds
      log('🔄 Polling запущен (30с)', 'info');
    }

    // Initialize
    loadConfig();
    if (config.workerUrl && config.deviceId) {
      startPolling();
    }
  </script>
</body>
</html>
